name: Claude Code Review

# Triggers a Claude code review on every PR open/sync. Authentication uses
# the repo secret `CLAUDE_CODE_OAUTH_TOKEN`, billed against the Claude.ai
# Max-plan subscription that minted the token.
#
# A second `@claude` mention workflow is intentionally NOT included here —
# add a separate file `.github/workflows/claude-mention.yml` listening on
# `issue_comment` if you want to invoke Claude via PR comments later.

on:
  pull_request:
    types: [opened, synchronize]

permissions:
  contents: read
  pull-requests: write
  issues: write
  id-token: write

jobs:
  claude-review:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout PR head
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Claude review
        uses: anthropics/claude-code-action@v0
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
